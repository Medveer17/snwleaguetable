<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>League Standings Pro</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 500px; margin-bottom: 20px; }
        h2 { margin-top: 0; color: #1a73e8; }
        .match { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        .match input { width: 40px; padding: 5px; text-align: center; border: 1px solid #ccc; border-radius: 4px; }
        .team-name { width: 80px; font-weight: bold; }
        button { background: #1a73e8; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-size: 16px; cursor: pointer; }
        button:hover { background: #1557b0; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; }
        .pos { width: 30px; font-weight: bold; color: #667; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Input Match Scores</h2>
        <div id="match-inputs">
            </div>
        <button onclick="calculateStandings()">Update League Table</button>
    </div>

    <div class="card">
        <h2>Live Standings</h2>
        <table id="standings-table">
            <thead>
                <tr>
                    <th class="pos">#</th>
                    <th>Team</th>
                    <th>GD</th>
                    <th>Pts</th>
                </tr>
            </thead>
            <tbody id="table-body">
                </tbody>
        </table>
    </div>

<script>
    const teams = ["Group A", "Group B", "Group C", "Group D"];
    const matches = [
        { t1: "Group A", t2: "Group B" },
        { t1: "Group C", t2: "Group D" },
        { t1: "Group A", t2: "Group C" },
        { t1: "Group B", t2: "Group D" },
        { t1: "Group D", t2: "Group A" },
        { t1: "Group C", t2: "Group B" }
    ];

    // Generate Match Inputs
    const container = document.getElementById('match-inputs');
    matches.forEach((m, i) => {
        container.innerHTML += `
            <div class="match">
                <span class="team-name">${m.t1}</span>
                <input type="number" id="m${i}s1" placeholder="0">
                <span>vs</span>
                <input type="number" id="m${i}s2" placeholder="0">
                <span class="team-name" style="text-align:right">${m.t2}</span>
            </div>
        `;
    });

    function calculateStandings() {
        let stats = {};
        teams.forEach(t => stats[t] = { name: t, points: 0, gd: 0 });

        matches.forEach((m, i) => {
            const s1 = parseInt(document.getElementById(`m${i}s1`).value);
            const s2 = parseInt(document.getElementById(`m${i}s2`).value);

            if (!isNaN(s1) && !isNaN(s2)) {
                // Goal Difference
                stats[m.t1].gd += (s1 - s2);
                stats[m.t2].gd += (s2 - s1);

                // Point Logic: 3 for Win, 1 for Draw, 1 for Loss
                if (s1 > s2) {
                    stats[m.t1].points += 3;
                    stats[m.t2].points += 1;
                } else if (s1 < s2) {
                    stats[m.t2].points += 3;
                    stats[m.t1].points += 1;
                } else {
                    stats[m.t1].points += 1;
                    stats[m.t2].points += 1;
                }
            }
        });

        // The Fancy Algorithm: Sorting by Points, then GD
        const sortedTeams = Object.values(stats).sort((a, b) => {
            if (b.points !== a.points) return b.points - a.points;
            return b.gd - a.gd;
        });

        // Update UI
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = "";
        sortedTeams.forEach((team, index) => {
            tbody.innerHTML += `
                <tr>
                    <td class="pos">${index + 1}</td>
                    <td>${team.name}</td>
                    <td>${team.gd > 0 ? '+' + team.gd : team.gd}</td>
                    <td><strong>${team.points}</strong></td>
                </tr>
            `;
        });
    }

    // Run once on load
    calculateStandings();
</script>
</body>
</html>
