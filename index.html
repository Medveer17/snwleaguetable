<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>League Standings Pro - 12 Match Edition</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f0f2f5; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 550px; margin-bottom: 20px; }
        h2 { margin-top: 0; color: #1a73e8; border-bottom: 2px solid #e8f0fe; padding-bottom: 10px; }
        .match-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 10px; align-items: center; margin-bottom: 10px; padding: 8px; background: #fafafa; border-radius: 8px; }
        .match-grid input { width: 45px; padding: 8px; text-align: center; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; }
        .team-name { font-weight: 600; font-size: 14px; }
        .right { text-align: right; }
        button { background: #1a73e8; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        button:hover { background: #1557b0; transform: translateY(-1px); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: center; padding: 12px 8px; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; color: #5f6368; font-size: 12px; text-transform: uppercase; }
        .pos { width: 30px; font-weight: bold; color: #1a73e8; }
        .t-left { text-align: left; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Input Match Scores (12 Matches)</h2>
        <div id="match-inputs"></div>
        <button onclick="calculateStandings()">Update League Table</button>
    </div>

    <div class="card">
        <h2>Live Standings</h2>
        <table id="standings-table">
            <thead>
                <tr>
                    <th class="pos">#</th>
                    <th class="t-left">Team</th>
                    <th>GD</th>
                    <th>Pts</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

<script>
    const teams = ["Group A", "Group B", "Group C", "Group D"];
    
    // 12 Matches: Home and Away
    const matches = [
        { t1: "Group A", t2: "Group B" }, { t1: "Group C", t2: "Group D" },
        { t1: "Group A", t2: "Group C" }, { t1: "Group B", t2: "Group D" },
        { t1: "Group D", t2: "Group A" }, { t1: "Group C", t2: "Group B" },
        // Reverse Fixtures
        { t1: "Group B", t2: "Group A" }, { t1: "Group D", t2: "Group C" },
        { t1: "Group C", t2: "Group A" }, { t1: "Group D", t2: "Group B" },
        { t1: "Group A", t2: "Group D" }, { t1: "Group B", t2: "Group C" }
    ];

    const container = document.getElementById('match-inputs');
    matches.forEach((m, i) => {
        container.innerHTML += `
            <div class="match-grid">
                <span class="team-name right">${m.t1}</span>
                <div>
                    <input type="number" id="m${i}s1" oninput="calculateStandings()">
                    <span style="margin: 0 5px">:</span>
                    <input type="number" id="m${i}s2" oninput="calculateStandings()">
                </div>
                <span class="team-name">${m.t2}</span>
            </div>
        `;
    });

    function calculateStandings() {
        let stats = {};
        let h2hMatrix = {}; // To track scores between specific pairs

        teams.forEach(t => {
            stats[t] = { name: t, points: 0, gd: 0 };
            h2hMatrix[t] = {};
            teams.forEach(opponent => { if(t !== opponent) h2hMatrix[t][opponent] = 0; });
        });

        matches.forEach((m, i) => {
            const val1 = document.getElementById(`m${i}s1`).value;
            const val2 = document.getElementById(`m${i}s2`).value;
            
            if (val1 !== "" && val2 !== "") {
                const s1 = parseInt(val1);
                const s2 = parseInt(val2);

                stats[m.t1].gd += (s1 - s2);
                stats[m.t2].gd += (s2 - s1);
                
                // H2H Tracker: add goals scored specifically against this opponent
                h2hMatrix[m.t1][m.t2] += s1;
                h2hMatrix[m.t2][m.t1] += s2;

                if (s1 > s2) { stats[m.t1].points += 3; stats[m.t2].points += 1; }
                else if (s1 < s2) { stats[m.t2].points += 3; stats[m.t1].points += 1; }
                else { stats[m.t1].points += 1; stats[m.t2].points += 1; }
            }
        });

        const sortedTeams = Object.values(stats).sort((a, b) => {
            // 1. Points
            if (b.points !== a.points) return b.points - a.points;
            
            // 2. Head-to-Head (Goals scored against each other)
            const aVsB = h2hMatrix[a.name][b.name];
            const bVsA = h2hMatrix[b.name][a.name];
            if (aVsB !== bVsA) return bVsA - aVsB;

            // 3. Goal Difference
            return b.gd - a.gd;
        });

        const tbody = document.getElementById('table-body');
        tbody.innerHTML = "";
        sortedTeams.forEach((team, index) => {
            tbody.innerHTML += `
                <tr>
                    <td class="pos">${index + 1}</td>
                    <td class="t-left"><strong>${team.name}</strong></td>
                    <td>${team.gd > 0 ? '+' + team.gd : team.gd}</td>
                    <td><strong>${team.points}</strong></td>
                </tr>
            `;
        });
    }
    calculateStandings();
</script>
</body>
</html>
